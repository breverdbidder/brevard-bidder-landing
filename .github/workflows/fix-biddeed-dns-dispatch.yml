name: Fix BidDeed DNS (dispatched from cli-anything-biddeed)
on:
  repository_dispatch:
    types: [fix-biddeed-dns-landing]
  workflow_dispatch:
jobs:
  dns:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Add DNS records for biddeed.ai
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo '=== Getting biddeed.ai zone ID ==='
          ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=biddeed.ai" \
            -H "Authorization: Bearer $CF_TOKEN")
          ZONE_ID=$(echo $ZONE_RESP | python3 -c "import json,sys; r=json.load(sys.stdin).get('result',[]); print(r[0]['id'] if r else 'NOT_FOUND')")
          echo "Zone ID: $ZONE_ID"
          if [ "$ZONE_ID" = "NOT_FOUND" ]; then
            echo 'Token cannot access biddeed.ai zone'
            echo "Zone response: $ZONE_RESP"
            exit 1
          fi
          echo '=== Current DNS records ==='
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); recs=d.get('result',[]); [print(f'  {r[\"type\"]} {r[\"name\"]} -> {r.get(\"content\",\"\")}'  ) for r in recs]; print(f'Total: {len(recs)} records')"
          echo '=== Adding CNAME: biddeed.ai -> brevard-bidder-landing.pages.dev ==='
          EX=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=biddeed.ai" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import json,sys; r=json.load(sys.stdin).get('result',[]); print(r[0]['id'] if r else 'NONE')")
          if [ "$EX" != "NONE" ]; then
            R=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EX" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"biddeed.ai","content":"brevard-bidder-landing.pages.dev","ttl":1,"proxied":true}')
          else
            R=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"biddeed.ai","content":"brevard-bidder-landing.pages.dev","ttl":1,"proxied":true}')
          fi
          echo $R | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK apex CNAME' if d.get('success') else f'FAIL apex: {d.get(\"errors\")}')"
          echo '=== Adding CNAME: www.biddeed.ai -> brevard-bidder-landing.pages.dev ==='
          EXW=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=www.biddeed.ai" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import json,sys; r=json.load(sys.stdin).get('result',[]); print(r[0]['id'] if r else 'NONE')")
          if [ "$EXW" != "NONE" ]; then
            RW=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXW" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"www","content":"brevard-bidder-landing.pages.dev","ttl":1,"proxied":true}')
          else
            RW=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"www","content":"brevard-bidder-landing.pages.dev","ttl":1,"proxied":true}')
          fi
          echo $RW | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK www CNAME' if d.get('success') else f'FAIL www: {d.get(\"errors\")}')"
          echo '=== Adding biddeed.ai as CF Pages custom domain ==='
          if [ -n "$CF_ACCT" ]; then
            P=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCT/pages/projects/brevard-bidder-landing/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"name":"biddeed.ai"}')
            echo $P | python3 -c "import json,sys; d=json.load(sys.stdin); errs=d.get('errors',[]); print('OK Pages custom domain' if d.get('success') else ('already registered' if any('already' in str(e).lower() or '10000' in str(e) for e in errs) else f'WARN Pages: {errs}'))"
            PW=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCT/pages/projects/brevard-bidder-landing/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d '{"name":"www.biddeed.ai"}')
            echo $PW | python3 -c "import json,sys; d=json.load(sys.stdin); errs=d.get('errors',[]); print('OK www Pages custom domain' if d.get('success') else ('already registered' if any('already' in str(e).lower() or '10000' in str(e) for e in errs) else f'WARN www Pages: {errs}'))"
          fi
          echo '=== Verify ==='
          sleep 20
          dig biddeed.ai A +short || echo 'propagating...'
          LIVE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://biddeed.ai 2>/dev/null || echo 000)
          echo "biddeed.ai: HTTP $LIVE"
          [ "$LIVE" = "200" ] || [ "$LIVE" = "301" ] || [ "$LIVE" = "302" ] && echo 'ONLINE' || echo 'DNS propagating — may take 2-5 more minutes'
