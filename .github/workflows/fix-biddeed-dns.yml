name: Fix BidDeed DNS

on:
  workflow_dispatch: {}

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    env:
      BD_ZONE: dcb6876f057e0bb88be181d6e8d0dcbc
      HETZNER_IP: "87.99.129.125"
    steps:
      - name: Try CLOUDFLARE_API_TOKEN
        run: |
          echo "=== Testing CLOUDFLARE_API_TOKEN ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | python3 -c "import json,sys; d=json.load(sys.stdin); print('SUCCESS' if d.get('success') else d.get('errors'))"

      - name: Try CF_API_TOKEN
        run: |
          echo "=== Testing CF_API_TOKEN ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" | python3 -c "import json,sys; d=json.load(sys.stdin); print('SUCCESS' if d.get('success') else d.get('errors'))"

      - name: Create DNS records with working token
        run: |
          # Try both tokens, use whichever works
          for TK in "${{ secrets.CF_API_TOKEN }}" "${{ secrets.CLOUDFLARE_API_TOKEN }}"; do
            RESULT=$(curl -s "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
              -H "Authorization: Bearer $TK" | python3 -c "import json,sys; print('OK' if json.load(sys.stdin).get('success') else 'FAIL')")
            
            if [ "$RESULT" = "OK" ]; then
              echo "Found working token. Creating records..."
              
              echo "=== biddeed.ai CNAME ==="
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
                -H "Authorization: Bearer $TK" -H "Content-Type: application/json" \
                -d '{"type":"CNAME","name":"biddeed.ai","content":"cname.vercel-dns.com","proxied":false,"ttl":1}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors'))"
              
              echo "=== www.biddeed.ai CNAME ==="
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
                -H "Authorization: Bearer $TK" -H "Content-Type: application/json" \
                -d '{"type":"CNAME","name":"www","content":"cname.vercel-dns.com","proxied":false,"ttl":1}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors'))"
              
              echo "=== ops.biddeed.ai A record ==="
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
                -H "Authorization: Bearer $TK" -H "Content-Type: application/json" \
                -d "{\"type\":\"A\",\"name\":\"ops\",\"content\":\"$HETZNER_IP\",\"proxied\":true,\"ttl\":1}" | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors'))"
              
              echo "=== Final state ==="
              curl -s "https://api.cloudflare.com/client/v4/zones/$BD_ZONE/dns_records" \
                -H "Authorization: Bearer $TK" | python3 -c "import json,sys; [print(r['type'],r['name'],'->',r['content']) for r in json.load(sys.stdin).get('result',[])]"
              
              exit 0
            fi
          done
          echo "ERROR: No token has access to biddeed.ai zone"
          exit 1

      - name: Verify HTTP
        run: |
          sleep 15
          for url in https://biddeed.ai https://ops.biddeed.ai; do
            code=$(curl -sI -o /dev/null -w "%{http_code}" "$url" --connect-timeout 10 2>/dev/null || echo "000")
            echo "$url -> HTTP $code"
          done
